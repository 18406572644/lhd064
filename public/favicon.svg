<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="compassBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </linearGradient>
    <linearGradient id="needleBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A78B8"/>
      <stop offset="100%" stop-color="#2C5F8F"/>
    </linearGradient>
    <linearGradient id="needleYellow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#B8892F"/>
      <stop offset="100%" stop-color="#D4A03C"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-color="#3E2C1C" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <circle cx="32" cy="32" r="30" fill="url(#compassBg)" stroke="#3E2C1C" stroke-width="2"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#3E2C1C" stroke-width="0.5" opacity="0.4"/>
  
  <g stroke="#3E2C1C" stroke-width="0.8" opacity="0.7">
    <line x1="32" y1="8" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="56"/>
    <line x1="8" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="56" y2="32"/>
    <line x1="15" y1="15" x2="19" y2="19" stroke-width="0.5"/>
    <line x1="45" y1="15" x2="49" y2="19" stroke-width="0.5"/>
    <line x1="15" y1="49" x2="19" y2="45" stroke-width="0.5"/>
    <line x1="45" y1="49" x2="49" y2="45" stroke-width="0.5"/>
  </g>
  
  <text x="32" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#3E2C1C">N</text>
  <text x="32" y="47" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#3E2C1C" opacity="0.8">S</text>
  <text x="13" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#3E2C1C" opacity="0.8">W</text>
  <text x="51" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#3E2C1C" opacity="0.8">E</text>
  
  <g filter="url(#shadow)">
    <polygon points="32,12 28,32 32,36 36,32" fill="url(#needleBlue)" stroke="#1A4270" stroke-width="0.5"/>
    <polygon points="32,52 28,32 32,28 36,32" fill="url(#needleYellow)" stroke="#8B6914" stroke-width="0.5"/>
  </g>
  
  <circle cx="32" cy="32" r="3.5" fill="#3E2C1C"/>
  <circle cx="32" cy="32" r="2" fill="#D4A03C"/>
</svg>
